# HTTPS 反代：www 为主机名，apex 跳转到 www。
# 证书路径默认 Let’s Encrypt（主域名为 www 时常见目录名如下）。
#
# 首次申请证书（任选一种，80/443 需在安全组放行）：
#   A) standalone（会短暂占用 80，先 systemctl stop nginx）：
#      sudo certbot certonly --standalone -d www.diandeng.online -d diandeng.online
#   B) 已有仅 HTTP 的 Nginx 且含下方 /.well-known/ 时：
#      sudo certbot certonly --webroot -w /var/www/certbot -d www.diandeng.online -d diandeng.online
# 签发后再：sudo nginx -t && sudo systemctl reload nginx
#
# 若 live 目录名不是 www.diandeng.online，请 ls /etc/letsencrypt/live/ 后改下面 ssl_certificate 路径。
# TLS 参数内联，避免依赖 certbot 的 /etc/letsencrypt/options-ssl-nginx.conf（仅装 certbot 时可能不存在）。

# HTTP：ACME 续期 + 其余跳转到 HTTPS www
server {
    listen 80;
    listen [::]:80;
    server_name www.diandeng.online diandeng.online;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location / {
        return 301 https://www.diandeng.online$request_uri;
    }
}

# HTTPS：apex → www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name diandeng.online;

    ssl_certificate     /etc/letsencrypt/live/www.diandeng.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.diandeng.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    location / {
        return 301 https://www.diandeng.online$request_uri;
    }
}

# HTTPS：主站 + API
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.diandeng.online;

    ssl_certificate     /etc/letsencrypt/live/www.diandeng.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.diandeng.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    client_max_body_size 20m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /chat/ {
        proxy_pass http://127.0.0.1:8000/chat/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /search/ {
        proxy_pass http://127.0.0.1:8000/search/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
