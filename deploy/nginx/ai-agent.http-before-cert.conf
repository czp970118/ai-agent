# 仅在「尚未签发 Let’s Encrypt 证书」时使用本文件替代 ai-agent.conf。
# 步骤：sudo nginx -t && sudo systemctl reload nginx
#       sudo mkdir -p /var/www/certbot/.well-known/acme-challenge
#       sudo certbot certonly --webroot -w /var/www/certbot -d www.diandeng.online -d diandeng.online
# 成功后改回 ai-agent.conf（HTTPS 版）并 reload。

server {
    listen 80;
    listen [::]:80;
    server_name www.diandeng.online diandeng.online;

    client_max_body_size 20m;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location /access/ {
        proxy_pass http://127.0.0.1:8000/access/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /chat/ {
        proxy_pass http://127.0.0.1:8000/chat/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /search/ {
        proxy_pass http://127.0.0.1:8000/search/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
